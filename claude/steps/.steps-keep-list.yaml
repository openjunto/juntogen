# .steps-keep-list.yaml — BL-025-h step-prompt vocabulary audit exemptions.
#
# PURPOSE: Enumerate the [EXTERNAL] platform-fact occurrences inside the
#          juntogen step-prompt corpus (juntogen/claude/steps/*.md) that
#          legitimately reference Claude-platform identifiers
#          (Task tool / TeamCreate / TeamDelete / SendMessage /
#          SubagentStart). Every occurrence outside this list is flagged
#          by step-prompt-vocabulary-audit.sh.
#
# SCOPE:   juntogen/claude/steps/ ONLY. Distinct from the spec-corpus
#          keep_list in juntospec/platform-contract.yaml. The two regimes
#          are intentionally separate:
#            - juntospec/platform-contract.yaml.keep_list governs the
#              core spec corpus (D/F/M*.md + README + MANIFEST).
#            - this file governs the step-prompt middle layer in juntogen.
#
# RATIONALE: Step prompts are the bridge between abstract spec corpus and
#            generated platform artifacts. Within them, references to
#            Claude tool/hook identifiers are appropriate where a step
#            prompt is documenting the snapshot schema, the hook contract,
#            or a settings.json invariant. The audit holds spec-prose
#            (Triage scoring, Design intent, Synthesis instructions) to
#            the abstract primitive vocabulary.
#
# Entry shape:
#   - file: "step-09-settings-and-hooks.md"
#     line: 52
#     term: "TeamCreate"
#     match_kind: "literal"
#     reason: "platform-fact-env-var-doc"
#     note: "Free-form rationale"
#
# Permitted reasons (step-prompt audit enum):
#   capability-schema           — step-00 platform.tools / hooks YAML rows
#   capability-schema-prose     — step-00 didactic notes about schema
#   inject-profile-binding      — step-07 SubagentStart hook contract refs
#   installer-hook-prose        — RETIRED with step-08 (BL-025-m.1).
#                                 Reason name retained for one-cycle audit
#                                 compatibility; no live entries remain.
#   settings-json-binding       — step-09 settings.json hook block refs
#   teardown-binding            — step-06 Convene primitive teardown call
#                                 (shutdown_request / TeamDelete)
#   platform-fact-env-var-doc   — step-09:52 env-var documentation

keep_list:
  # ── step-00: Platform capability ingestion ──────────────────────────
  # Capability schema YAML rows — frozen platform-tool name list.
  - file: "step-00-platform-ingestion.md"
    line: 65
    term: "Task tool"
    match_kind: "literal"
    reason: "capability-schema"
    note: "Schema comment binding 'Agent' (platform name) to 'Task tool' (legacy spec vocabulary)."
  - file: "step-00-platform-ingestion.md"
    line: 69
    term: "TeamCreate"
    match_kind: "literal"
    reason: "capability-schema"
    note: "platform.tools[] YAML row enumerating TeamCreate."
  - file: "step-00-platform-ingestion.md"
    line: 72
    term: "TeamDelete"
    match_kind: "literal"
    reason: "capability-schema"
    note: "platform.tools[] YAML row enumerating TeamDelete."
  - file: "step-00-platform-ingestion.md"
    line: 75
    term: "SendMessage"
    match_kind: "literal"
    reason: "capability-schema"
    note: "platform.tools[] YAML row enumerating SendMessage."
  - file: "step-00-platform-ingestion.md"
    line: 161
    term: "SubagentStart"
    match_kind: "literal"
    reason: "capability-schema"
    note: "platform.hooks[] YAML row enumerating the SubagentStart hook point."
  - file: "step-00-platform-ingestion.md"
    line: 175
    term: "Task tool"
    match_kind: "literal"
    reason: "capability-schema-prose"
    note: "Didactic note: 'Agent' on the platform is referred to as 'Task tool' in spec corpus."
  - file: "step-00-platform-ingestion.md"
